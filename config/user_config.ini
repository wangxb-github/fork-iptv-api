[Settings]
; =========================
; 用户自定义配置覆盖（覆盖 config.ini 同名配置项）
; =========================

; =========================
; 定时执行设置 - 仅手动跑，不定时
; =========================
# 启动时执行更新（启动脚本立即跑一次更新）
update_startup = True
# 间隔设为 0 表示不循环定时跑，只跑一次
update_interval = 0
# 时区
time_zone = Asia/Shanghai
# 语言
language = zh_CN


; =========================
; 结果输出 & 服务配置
; =========================
# 关闭页面服务（不需要 Web UI，只输出文件）
open_service = False


; =========================
; 过滤 & 测速设置 - 严格模式
; =========================
# 开启测速
open_speed_test = True
# 开启分辨率过滤
open_filter_resolution = True
# 开启速率过滤
open_filter_speed = True
# 全量测速（严格模式：频道下所有接口都参与测速，不在达到 urls_limit 后提前停止）
open_full_speed_test = True

# 严格阈值：最小分辨率 1080p
min_resolution = 1920x1080
# 严格阈值：最小速率 1.0 MB/s
min_speed = 1.0

# 指定分类放宽到 720p（默认仍按 1080p 过滤）
# 格式：分类1|分类2:分辨率;分类3:分辨率（多组用 ; 分隔，同组多个分类用 | 分隔）
# 下面这 6 个分类放宽到 720p，其它分类（央视频道/卫视频道/地方频道等）保持 1080p 严格
category_min_resolution_overrides = 电影|电视剧|综艺频道|NewTV|儿童频道|国际台:1280x720

# 测速并发数：Mac 性能可以承受更高并发，加快速度
speed_test_limit = 10
# 测速超时（秒）：放宽到 15 秒，避免高质量接口被误判
speed_test_timeout = 15
# 查询超时
request_timeout = 10


; =========================
; 关闭 RTMP 推流（不需要本地推流，简化输出）
; =========================
open_rtmp = False