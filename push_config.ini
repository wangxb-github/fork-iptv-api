[Settings]
; =========================
; 自动 push 配置 - run.sh 测速完成后自动 commit + push 到 GitHub
; =========================

# 目标分支
target_branch = master
# 仓库（用于显示，不影响 push）
repository = wangxb-github/fork-iptv-api

# Git 提交者（必须与 SSH key 关联的 GitHub 账号一致，否则 push 被拒）
git_user_name = wangxb-github
git_user_email = wangxb-github@users.noreply.github.com

# commit message 模板（可用占位符：{date} {time} {count} {branch}）
commit_message_template = iptv: auto-update {date} {time} ({count} interfaces)

# 对外发布目录（拷贝到这再 push）
publish_dir = live

# 要发布的文件（相对 output/ 目录，管道符分隔）
publish_files = result.m3u|result.txt|ipv4/result.m3u|ipv4/result.txt|ipv6/result.m3u|ipv6/result.txt

# push 前是否自动拉取远端（避免冲突）
auto_pull = True

# 失败时是否回滚 commit（push 失败时）
auto_rollback = True
